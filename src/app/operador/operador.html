<div class="d-flex justify-content-center">
    <div class="w-50">
        <div class="mb-3">
            <label for="inputText" class="mx-2">Operador 1:</label>
            <input type="text" id="inputText" [(ngModel)]="operador1" autocomplete="off">
        </div>
        <div class="mb-3">
            <label for="inputText" class="mx-2">Operador 2:</label>
            <input type="text" id="inputText" [(ngModel)]="operador2" autocomplete="off">
        </div>
        <div class="mt-4 mx-auto me-2">
            <button class="btn btn-primary" (click)="resultado()">
                Sumar
            </button>
        </div>
        <div class="alert alert-success mt-4 mx-auto">
            {{resultado()}}
        </div>
    </div>
</div>
