<div class="d-flex justify-content-center">
    <div class="w-25 mt-3">
        <div class="mb-3 d-flex aling-items-center">
            <label for="inputNumber" class="form-label me-2 text-nowrap">Operador 1:</label>
            <input type="number" id="inputNumber" class="form-control text-center" 
            [(ngModel)]="operador1">
        </div>
        <div class="mb-3 d-flex aling-items-center">
            <label for="inputNumber" class="form-label me-2 text-nowrap">Operador 2:</label>
            <input type="number" id="inputNumber" class="form-control text-center" 
            [(ngModel)]="operador2">
        </div>
        <button class="btn btn-primary w-100" (click)="enviarResultado()">
            Sumar
        </button>
    </div>
</div>
